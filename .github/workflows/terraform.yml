name: Terraform Pipeline

on:
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    # For PRs → default to dev (no approvals triggered)
    environment:
      name: ${{ inputs.environment || 'dev' }}

    env:
      ENVIRONMENT: ${{ inputs.environment || 'dev' }}

    defaults:
      run:
        working-directory: infra/envs/${{ env.ENVIRONMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-tfstate" \
            -backend-config="storage_account_name=sttfstate123" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ env.ENVIRONMENT }}.terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      # Create plan
      - name: Terraform Plan
        run: terraform plan -no-color -var-file=${{ env.ENVIRONMENT }}.tfvars -out=tfplan

      # Show plan for PRs
      - name: Show Plan (PR)
        if: github.event_name == 'pull_request'
        run: terraform show -no-color tfplan

      # Comment on PR
      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = require('child_process')
              .execSync('terraform show -no-color tfplan')
              .toString();

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan 📦\n\`\`\`hcl\n${plan}\n\`\`\``
            });

      # Apply ONLY when manually triggered
      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve tfplan