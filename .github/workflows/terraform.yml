name: Terraform Pipeline

on:
  pull_request:

  push:
    branches:
      - main # auto deploy to dev on push to main

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev/staging/prod)"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    # For PRs → default to dev (no approvals triggered)
    environment:
      name: ${{ github.event_name == 'push' && 'dev' || inputs.environment || 'dev' }}

    env:
      ENVIRONMENT: ${{ github.event_name == 'push' && 'dev' || inputs.environment || 'dev' }}

    defaults:
      run:
        working-directory: infra/envs/${{ env.ENVIRONMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
              {
                "clientId": "${{ secrets.ARM_CLIENT_ID }}",
                "clientSecret": "${{ secrets.ARM_CLIENT_SECRET }}",
                "subscriptionId": "${{ secrets.ARM_SUBSCRIPTION_ID }}",
                "tenantId": "${{ secrets.ARM_TENANT_ID }}"
              }

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.CONTAINER_NAME }}" \
            -backend-config="key=${{ env.ENVIRONMENT }}.terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      # Create plan
      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -var-file=${{ env.ENVIRONMENT }}.tfvars -out=tfplan

      # Show plan for PRs
      - name: Terraform Show Plan
        if: github.event_name == 'pull_request'
        run: terraform show -no-color tfplan > plan.txt

      # Comment on PR
      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            if (!fs.existsSync('plan.txt')) {
                console.log('No plan file found, skipping comment.');
                return;
            }

            const plan = fs.readFileSync('plan.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan 📦\n\`\`\`hcl\n${plan}\n\`\`\``
            });

      # Apply ONLY when manually triggered
      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: terraform apply -auto-approve tfplan